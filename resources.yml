Resources:
  ChatWebsocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ${self:custom.websocketConnectionsTableName}
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: chatId
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ${self:custom.websocketConnectionsChatIdIndexName}
          KeySchema:
            - AttributeName: chatId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ChatStatisticsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: chat-statistics
      AttributeDefinitions:
        - AttributeName: chatId
          AttributeType: S
      KeySchema:
        - AttributeName: chatId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ChatEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: chat-events
      AttributeDefinitions:
        - AttributeName: chatId
          AttributeType: S
        - AttributeName: date
          AttributeType: N
      KeySchema:
        - AttributeName: chatId
          KeyType: HASH
        - AttributeName: date
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST

  WebsocketBroadcastStatsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: websocket-broadcast-stats
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:TagResource
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - execute-api:ManageConnections
                Resource:
                  - Fn::Join:
                      - ''
                      - - 'arn:aws:execute-api:'
                        - Ref: AWS::Region
                        - ':'
                        - Ref: AWS::AccountId
                        - ':'
                        - Ref: WebsocketsApi
                        - /${sls:stage}/POST/@connections/*
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - arn:aws:dynamodb:*:*:table/chat-statistics
                  - arn:aws:dynamodb:*:*:table/chat-events
                  - arn:aws:dynamodb:*:*:table/${self:custom.websocketConnectionsTableName}
                  - arn:aws:dynamodb:*:*:table/${self:custom.websocketConnectionsTableName}/index/${self:custom.websocketConnectionsChatIdIndexName}
              - Effect: Allow
                Action:
                  - dynamodb:DeleteItem
                Resource:
                  - arn:aws:dynamodb:*:*:table/${self:custom.websocketConnectionsTableName}
