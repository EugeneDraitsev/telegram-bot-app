service: telegram
useDotenv: true

params:
  default:
    chatStatisticsTableName: ${self:service}-${sls:stage}-chat-statistics
    chatEventsTableName: ${self:service}-${sls:stage}-chat-events
  prod:
    chatStatisticsTableName: chat-statistics
    chatEventsTableName: chat-events

provider:
  name: aws
  stage: prod
  region: eu-central-1
  memorySize: 512
  timeout: 30
  runtime: ${self:custom.runtimeByStage.${sls:stage}, 'nodejs24.x'}
  architecture: arm64
  environment:
    region: eu-central-1
    stage: ${sls:stage}
    FRONTEND_BASE_URL: ${self:custom.frontendBaseUrl}
    CHAT_SEARCH_ALLOWED_ORIGINS: ${env:CHAT_SEARCH_ALLOWED_ORIGINS, self:custom.chatSearchAllowedOrigins}
    CHAT_STATISTICS_TABLE_NAME: ${self:custom.runtimeChatStatisticsTableNameByStage.${sls:stage}, self:custom.chatStatisticsTableName}
    CHAT_EVENTS_TABLE_NAME: ${self:custom.runtimeChatEventsTableNameByStage.${sls:stage}, self:custom.chatEventsTableName}
    WEBSOCKET_CONNECTIONS_TABLE_NAME: ${self:custom.websocketConnectionsTableName}
    WEBSOCKET_CONNECTIONS_CHAT_ID_INDEX_NAME: ${self:custom.websocketConnectionsChatIdIndexName}
functions:
  telegram-bot:
    timeout: 10
    handler: src/telegram-bot/index.default
    role:
      Fn::GetAtt:
        - TelegramIngressRole
        - Arn
    environment:
      TOKEN: ${env:TOKEN}
      TELEGRAM_WEBHOOK_SECRET: ${env:TELEGRAM_WEBHOOK_SECRET}
      REPLY_WORKER_FUNCTION_NAME: ${self:service}-${sls:stage}-telegram-reply-worker
      AGENT_WORKER_FUNCTION_NAME: ${self:service}-${sls:stage}-telegram-agent-worker
      ACTIVITY_WORKER_FUNCTION_NAME: ${self:service}-${sls:stage}-telegram-activity-worker
    events:
      - http:
          path: /
          method: post

  telegram-reply-worker:
    handler: src/telegram-bot/telegram-reply-worker.default
    role:
      Fn::GetAtt:
        - TelegramReplyWorkerRole
        - Arn
    timeout: 300
    memorySize: 1536
    environment:
      TOKEN: ${env:TOKEN}
      GOOGLE_CX_TOKEN: ${env:GOOGLE_CX_TOKEN}
      COMMON_GOOGLE_API_KEY: ${env:COMMON_GOOGLE_API_KEY}
      OPEN_WEATHER_MAP_TOKEN: ${env:OPEN_WEATHER_MAP_TOKEN}
      YOUTUBE_TOKEN: ${env:YOUTUBE_TOKEN}
      FIXER_API_KEY: ${env:FIXER_API_KEY}
      EXCHANGE_RATE_API_KEY: ${env:EXCHANGE_RATE_API_KEY}
      OPENAI_API_KEY: ${env:OPENAI_API_KEY}
      GEMINI_API_KEY: ${env:GEMINI_API_KEY}
      OPENAI_CHAT_IDS: ${env:OPENAI_CHAT_IDS}
      UPSTASH_REDIS_URL: ${env:UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${env:UPSTASH_REDIS_TOKEN}
      TAVILY_API_KEY: ${env:TAVILY_API_KEY}

  telegram-agent-worker:
    handler: src/agent-worker/index.default
    role:
      Fn::GetAtt:
        - TelegramAgentWorkerRole
        - Arn
    timeout: 300
    memorySize: 1536
    maximumEventAge: 3600
    maximumRetryAttempts: 2
    environment:
      TOKEN: ${env:TOKEN}
      GOOGLE_CX_TOKEN: ${env:GOOGLE_CX_TOKEN}
      COMMON_GOOGLE_API_KEY: ${env:COMMON_GOOGLE_API_KEY}
      OPEN_WEATHER_MAP_TOKEN: ${env:OPEN_WEATHER_MAP_TOKEN}
      OPENAI_API_KEY: ${env:OPENAI_API_KEY}
      OPENAI_CHAT_IDS: ${env:OPENAI_CHAT_IDS}
      GEMINI_API_KEY: ${env:GEMINI_API_KEY}
      UPSTASH_REDIS_URL: ${env:UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${env:UPSTASH_REDIS_TOKEN}
      GIPHY_API_KEY: ${env:GIPHY_API_KEY}

  telegram-activity-worker:
    handler: src/telegram-bot/activity-worker.default
    role:
      Fn::GetAtt:
        - TelegramActivityWorkerRole
        - Arn
    environment:
      OPENAI_CHAT_IDS: ${env:OPENAI_CHAT_IDS}
      UPSTASH_REDIS_URL: ${env:UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${env:UPSTASH_REDIS_TOKEN}
      WEBSOCKET_BROADCAST_FUNCTION_NAME: ${self:service}-${sls:stage}-websocket-broadcast-stats

  currency-scheduler:
    handler: src/telegram-bot/currency-scheduler.default
    role:
      Fn::GetAtt:
        - CurrencySchedulerRole
        - Arn
    timeout: 300
    memorySize: 1536
    environment:
      TOKEN: ${env:TOKEN}
      FIXER_API_KEY: ${env:FIXER_API_KEY}
      EXCHANGE_RATE_API_KEY: ${env:EXCHANGE_RATE_API_KEY}
      GEMINI_API_KEY: ${env:GEMINI_API_KEY}
      TAVILY_API_KEY: ${env:TAVILY_API_KEY}
    events:
      - schedule:
          name: ${self:service}-${sls:stage}-currency-scheduler-event
          enabled: ${env:ENABLE_SCHEDULING, true}
          rate: cron(0 9,17 ? * MON-FRI *)

  redis-scheduler:
    handler: src/telegram-bot/redis-scheduler.default
    role:
      Fn::GetAtt:
        - RedisSchedulerRole
        - Arn
    environment:
      UPSTASH_REDIS_URL: ${env:UPSTASH_REDIS_URL}
      UPSTASH_REDIS_TOKEN: ${env:UPSTASH_REDIS_TOKEN}
    events:
      - schedule:
          name: ${self:service}-${sls:stage}-redis-scheduler-event
          enabled: ${env:ENABLE_SCHEDULING, true}
          rate: rate(1 hour)

  sharp-renderer:
    handler: src/sharp-renderer/index.default
    role:
      Fn::GetAtt:
        - SharpRendererRole
        - Arn
    package:
      patterns:
        - fonts/**
    layers:
      - Ref: SharpRendererLambdaLayer
    environment:
      FONTCONFIG_PATH: "./fonts"
    memorySize: 1536

  websocket-connect:
    handler: src/websockets/index.connect
    role:
      Fn::GetAtt:
        - WebsocketConnectRole
        - Arn
    events:
      - websocket:
          route: $connect

  websocket-disconnect:
    handler: src/websockets/index.disconnect
    role:
      Fn::GetAtt:
        - WebsocketDisconnectRole
        - Arn
    events:
      - websocket:
          route: $disconnect

  websocket-stats:
    handler: src/websockets/index.stats
    role:
      Fn::GetAtt:
        - WebsocketStatsRole
        - Arn
    events:
      - websocket:
          route: stats

  websocket-broadcast-stats:
    handler: src/websockets/index.broadcastStats
    role:
      Fn::GetAtt:
        - WebsocketBroadcastStatsRole
        - Arn
    environment:
      WEBSOCKET_BROADCAST_ENDPOINT:
        Fn::Join:
          - ''
          - - Ref: WebsocketsApi
            - .execute-api.
            - Ref: AWS::Region
            - .
            - Ref: AWS::URLSuffix
            - /${sls:stage}

  chat-search:
    handler: src/chat-search/index.getChatByName
    role:
      Fn::GetAtt:
        - ChatSearchRole
        - Arn
    events:
      - http:
          path: /search
          method: get
      - http:
          path: /search
          method: options

plugins:
  - serverless-esbuild
  - serverless-offline

package:
  individually: true

layers:
  sharpRenderer:
    path: .layers/sharp
    compatibleRuntimes:
      - ${self:provider.runtime}
    compatibleArchitectures:
      - arm64

build:
  esbuild: false

custom:
  runtimeByStage:
    local: nodejs24.x
  runtimeChatStatisticsTableNameByStage:
    local: chat-statistics
  runtimeChatEventsTableNameByStage:
    local: chat-events
  esbuildTargetByStage:
    local: node24
  websocketConnectionsTableName: ${self:service}-${sls:stage}-websocket-connections
  websocketConnectionsChatIdIndexName: ${self:service}-${sls:stage}-websocket-connections-chat-id
  chatStatisticsTableName: ${param:chatStatisticsTableName}
  chatEventsTableName: ${param:chatEventsTableName}
  frontendBaseUrl: ${env:FRONTEND_BASE_URL, 'https://telegram-bot-ui.vercel.app'}
  chatSearchAllowedOrigins: ${self:custom.frontendBaseUrl},http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
  serverless-offline:
    httpPort: 4000
    reloadHandler: true
    useInProcess: false
    terminateIdleLambdaTime: 10
  esbuild:
    target: ${self:custom.esbuildTargetByStage.${sls:stage}, 'node24'}
    platform: node
    format: esm
    outputFileExtension: .mjs
    banner:
      js: "import { createRequire } from 'module'; const require = createRequire(import.meta.url);"
    exclude:
      - sharp
      - "@aws-sdk/client-apigatewaymanagementapi"
      - "@aws-sdk/client-dynamodb"
      - "@aws-sdk/client-lambda"
      - "@aws-sdk/client-s3"
      - "@aws-sdk/lib-dynamodb"

resources:
  - ${file(resources.yml)}
  - ${file(iamRoles.yml)}
