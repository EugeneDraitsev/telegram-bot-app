- Effect: Allow
  Action:
    - lambda:InvokeFunction
    - lambda:InvokeAsync
  Resource:
    - arn:aws:lambda:*:*:telegram-*-sharp-statistics
    - arn:aws:lambda:*:*:telegram-*-reply-worker
    - arn:aws:lambda:*:*:telegram-*-agent-worker
    - arn:aws:lambda:*:*:telegram-*-activity-worker
    - arn:aws:lambda:*:*:telegram-*-websocket-broadcast-stats
- Effect: Allow
  Action:
    - dynamodb:Query
    - dynamodb:Scan
    - dynamodb:GetItem
    - dynamodb:PutItem
    - dynamodb:UpdateItem
    - dynamodb:DeleteItem
  Resource:
    - arn:aws:dynamodb:*:*:table/chat-statistics
    - arn:aws:dynamodb:*:*:table/chat-events
    - arn:aws:dynamodb:*:*:table/${self:custom.websocketConnectionsTableName}
    - arn:aws:dynamodb:*:*:table/${self:custom.websocketConnectionsTableName}/index/${self:custom.websocketConnectionsChatIdIndexName}
